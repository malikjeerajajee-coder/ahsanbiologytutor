<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pakistan Studies: Constitutional History Quiz</title>
    <!-- Inter font: clean, modern, no distractions -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;      /* plain white background */
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            color: #111111;
            line-height: 1.5;
            padding: 2rem 1rem;
        }

        /* main container – no cards, no floating effects */
        .quiz-container {
            max-width: 860px;
            margin: 0 auto;
            background: #ffffff;
            width: 100%;
        }

        /* header section – simple, no background tint */
        .quiz-header {
            margin-bottom: 2.5rem;
            border-bottom: 1px solid #e5e5e5;
            padding-bottom: 1.25rem;
        }

        .quiz-title {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            margin-bottom: 0.5rem;
            color: #000000;
        }

        .quiz-description {
            font-size: 0.95rem;
            color: #3c3c3c;
            max-width: 680px;
        }

        /* stats bar: plain row */
        .stats-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 2rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: #2c2c2c;
            border-bottom: 1px solid #ececec;
            padding-bottom: 0.75rem;
        }

        .progress-text {
            font-weight: 500;
        }

        .score-text {
            font-weight: 600;
        }

        /* each question block – no card, no shadow, no rounding effects */
        .question-block {
            margin-bottom: 2rem;
            padding: 0 0 1.25rem 0;
            border-bottom: 1px solid #eaeaea;
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            line-height: 1.4;
            color: #000000;
        }

        /* options list – simple list */
        .options-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .option-item {
            margin-bottom: 0.75rem;
            display: flex;
            align-items: flex-start;
            gap: 0.6rem;
            font-size: 0.95rem;
            cursor: pointer;
        }

        .option-radio {
            margin-top: 0.1rem;
            width: 1rem;
            height: 1rem;
            accent-color: #1a1a1a;
            cursor: pointer;
            flex-shrink: 0;
        }

        .option-label {
            cursor: pointer;
            color: #1f1f1f;
            line-height: 1.4;
        }

        /* feedback area for each question */
        .feedback {
            margin-top: 0.75rem;
            font-size: 0.85rem;
            font-weight: 500;
            padding-top: 0.3rem;
            color: #2c2c2c;
        }

        .feedback.correct {
            color: #0a6b2f;
        }

        .feedback.incorrect {
            color: #b13a3a;
        }

        /* action buttons – plain, no gradients */
        .actions {
            margin-top: 2rem;
            margin-bottom: 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            border-top: 1px solid #ececec;
            padding-top: 2rem;
        }

        button {
            background: none;
            border: 1px solid #cccccc;
            padding: 0.6rem 1.4rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s ease;
            color: #1a1a1a;
            background-color: #ffffff;
        }

        button:hover {
            background-color: #f5f5f5;
            border-color: #999999;
        }

        button:active {
            background-color: #e8e8e8;
        }

        .reset-btn {
            border-color: #b3b3b3;
        }

        .submit-all-btn {
            border-color: #1a1a1a;
            background-color: #ffffff;
            font-weight: 600;
        }

        .result-area {
            margin-top: 1.2rem;
            padding: 1rem 0;
            border-top: 1px solid #eaeaea;
            font-weight: 500;
            font-size: 1rem;
        }

        hr {
            border: none;
            border-top: 1px solid #eeeeee;
            margin: 1rem 0;
        }

        /* mobile adjustment */
        @media (max-width: 640px) {
            body {
                padding: 1.2rem;
            }
            .question-text {
                font-size: 1rem;
            }
            .option-label {
                font-size: 0.9rem;
            }
            button {
                padding: 0.5rem 1rem;
            }
        }
    </style>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-header">
        <h1 class="quiz-title">Constitutional History of Pakistan</h1>
        <div class="quiz-description">
            Based on official MCQs from Pak Study (1956, 1962, 1973 constitutions, Objective Resolution, Bogra Formula & amendments). Select the best answer for each question.
        </div>
    </div>

    <div class="stats-bar">
        <span class="progress-text" id="progressIndicator">0 / 40 answered</span>
        <span class="score-text" id="scoreIndicator">Score: 0</span>
    </div>

    <div id="questions-container">
        <!-- questions will be injected here via js -->
    </div>

    <div class="actions">
        <button id="submitAllBtn" class="submit-all-btn">✓ Submit all answers</button>
        <button id="resetBtn" class="reset-btn">⟳ Reset all</button>
    </div>
    <div id="resultArea" class="result-area"></div>
</div>

<script>
    // ---------- MCQs extracted from document (constitutional history) ----------
    const questionsData = [
        { text: "Who was the first President of the Constituent Assembly of Pakistan?", options: ["Liaquat Ali Khan", "Quaid-e-Azam", "Moulvi Tameez-ud-Din", "Sardar Abdur Rab Nishtar"], correct: 1 },
        { text: "After how many years did Pakistan get its first constitution?", options: ["5 years", "7 years", "9 years", "11 years"], correct: 2 },
        { text: "What document was firstly drafted to give pace to the constitution making process?", options: ["Representative Act", "Pakistan Act", "Independence Act", "Objective Resolution"], correct: 3 },
        { text: "When did the Constituent Assembly pass the Objective Resolution?", options: ["14th February 1949", "12th March 1949", "9th June 1949", "15th August 1949"], correct: 1 },
        { text: "When did Mohammad Ali Bogra present the Bogra Formula in the assembly?", options: ["January 1953", "April 1953", "September 1953", "October 1953"], correct: 3 },
        { text: "Who was Mohammad Ali Bogra?", options: ["Prime Minister", "Foreign Minister", "Law Minister", "Parliament Minister"], correct: 0 },
        { text: "What is the other name of Mohammad Ali Bogra Formula?", options: ["New Law of Pakistan", "Pakistan Report", "Third Report", "Constitutional Formula"], correct: 3 },
        { text: "When was the first constitution of Pakistan enforced?", options: ["8th June 1956", "23rd March 1956", "14th August 1956", "25th December 1956"], correct: 1 },
        { text: "Who was the Prime Minister of Pakistan during enforcement of the first constitution?", options: ["Mohammad Ali Bogra", "Khwaja Nazim Uddin", "Choudhry Mohammad Ali", "Ibrahim Ismail Chundrigar"], correct: 2 },
        { text: "What official name was given to Pakistan in the 1956 constitution?", options: ["United States of Pakistan", "Republic of Pakistan", "Islamic Pakistan", "Islamic Republic of Pakistan"], correct: 3 },
        { text: "What age was prescribed for the President in the 1956 constitution?", options: ["40 years", "45 years", "50 years", "55 years"], correct: 0 },
        { text: "In respect of religion, what term was set for President and Prime Minister in the 1956 constitution?", options: ["He may be a Muslim", "He must not be Hindu", "He must not be Christian", "He must be a Muslim"], correct: 3 },
        { text: "What was the official language declared in the 1956 constitution?", options: ["Urdu", "Bengali", "Hindi", "Both A & B"], correct: 3 },
        { text: "Who abrogated the 1956 constitution?", options: ["Ayub Khan", "Tikka Khan", "Iskander Mirza", "Yahya Khan"], correct: 2 },
        { text: "When was the first constitution abrogated and Martial Law proclaimed?", options: ["May 1958", "June 1958", "October 1958", "December 1958"], correct: 2 },
        { text: "How many articles were there in the constitution of 1956?", options: ["200 Articles", "259 Articles", "254 Articles", "234 Articles"], correct: 3 },
        { text: "Which kind of system of Government was introduced by the 1962 constitution?", options: ["Autonomous", "Presidential", "Bicameral", "Confederate"], correct: 1 },
        { text: "When was the constitution of 1962 abrogated?", options: ["20th March 1969", "29th March 1969", "4th April 1969", "14th April 1969"], correct: 0 },
        { text: "Who abrogated the 1962 constitution and became CMLA?", options: ["Gen. Tikka Khan", "Gen. Ahsan Khan", "Gen. Mansoor Khan", "Gen. Yahya Khan"], correct: 3 },
        { text: "How many articles were there in the 1962 constitution?", options: ["225 Articles", "250 Articles", "275 Articles", "290 Articles"], correct: 1 },
        { text: "Which kind of system of Government was introduced in the 1973 constitution?", options: ["Parliamentary", "Presidential", "Basic Democracy", "Autonomous"], correct: 0 },
        { text: "Who elects the President according to the 1973 constitution?", options: ["National Assembly", "Senate", "Provincial Assemblies", "All of them"], correct: 3 },
        { text: "According to the 1973 constitution, who elects the Prime Minister?", options: ["Senate", "National Assembly", "President", "Provincial Assemblies"], correct: 1 },
        { text: "In which constitution was Bicameral Legislature provided for the first time?", options: ["1949", "1956", "1962", "1973"], correct: 3 },
        { text: "In the constitution of 1973, what age is specified for a person to contest election to the National Assembly?", options: ["25 years", "18 years", "20 years", "30 years"], correct: 0 },
        { text: "In the 1973 constitution, what number of seats in the Senate was set?", options: ["120 Seats", "115 Seats", "110 Seats", "100 Seats"], correct: 3 },
        { text: "According to the 1973 constitution, what is the term of office of the President?", options: ["6 years", "5 years", "4 years", "3 years"], correct: 1 },
        { text: "Article 58(2b) of the 1973 constitution is about:", options: ["Power of President to dismiss Army Chief", "Power of President to dissolve Provincial Assemblies", "Power of President to dissolve National Assembly", "Power of President to dissolve Senate"], correct: 2 },
        { text: "In the 1973 constitution, who were declared non-Muslims?", options: ["Qadiyanis", "Hindus", "Christians", "Jews"], correct: 0 },
        { text: "The 1973 Constitution of Pakistan came into force on?", options: ["23rd March 1973", "14th August 1973", "8th June 1973", "27th October 1973"], correct: 1 },
        { text: "How many articles are there in the 1973 constitution of Pakistan?", options: ["290", "245", "280", "272"], correct: 2 },
        { text: "How many schedules are there in the 1973 constitution of Pakistan?", options: ["5", "6", "7", "8"], correct: 2 },
        { text: "A total of how many amendments to the constitution of 1973 have been passed by the Parliament?", options: ["21", "23", "25", "26"], correct: 1 },
        { text: "The 22nd Amendment in the 1973 Constitution of Pakistan is related to?", options: ["Pak Army Trial Courts", "Powers of Election Commission Members", "Related to NRO", "Not made yet"], correct: 1 },
        { text: "Which article of the 1973 constitution is related to the affairs of Zakat?", options: ["31", "44", "46", "39"], correct: 0 },
        { text: "The concept of acting in aid of civil power by the armed forces has been laid down in the Constitution of Pakistan 1973 under which article?", options: ["Article 245", "Article 270", "Article 243", "Article 200"], correct: 0 },
        { text: "Under which article of the 1973 constitution is Governor's Rule imposed in case of failure of constitutional machinery in the province?", options: ["234", "236", "238", "240"], correct: 0 },
        { text: "Who was the first Prime Minister of Pakistan to present the Bogra Formula?", options: ["Liaquat Ali Khan", "Mohammad Ali Bogra", "Choudhry Mohammad Ali", "Khwaja Nazimuddin"], correct: 1 },
        { text: "The Objective Resolution was passed in:", options: ["March 1949", "August 1947", "January 1950", "February 1948"], correct: 0 },
        { text: "Who was the first President of Pakistan under the 1956 constitution?", options: ["Iskander Mirza", "Ayub Khan", "Ghulam Muhammad", "Quaid-e-Azam"], correct: 0 }
    ];

    // Store user selections: array of selected index (null if not answered)
    let userSelections = new Array(questionsData.length).fill(null);
    // Track whether final score has been shown (optional)
    let overallScore = 0;

    // Helper: compute current answered count & score based on selections
    function computeStats() {
        let answered = 0;
        let correctCount = 0;
        for (let i = 0; i < questionsData.length; i++) {
            const selected = userSelections[i];
            if (selected !== null && selected !== undefined) {
                answered++;
                if (selected === questionsData[i].correct) {
                    correctCount++;
                }
            }
        }
        return { answered, correctCount };
    }

    // Update stats bar & result summary (without full auto-submit each time, but sync)
    function updateStatsAndResultBar() {
        const { answered, correctCount } = computeStats();
        document.getElementById('progressIndicator').innerText = `${answered} / ${questionsData.length} answered`;
        document.getElementById('scoreIndicator').innerText = `Score: ${correctCount}`;
        // also update result area softly (not overriding final message unless explicit)
        const resultDiv = document.getElementById('resultArea');
        if (answered === questionsData.length) {
            resultDiv.innerHTML = `<span>✓ All questions attempted. Final score: ${correctCount} / ${questionsData.length} (${Math.round((correctCount/questionsData.length)*100)}%)</span>`;
        } else {
            resultDiv.innerHTML = `<span>📋 ${answered} of ${questionsData.length} answered. Submit all to see final score & review.</span>`;
        }
        overallScore = correctCount;
    }

    // Render all questions dynamically
    function renderQuestions() {
        const container = document.getElementById('questions-container');
        container.innerHTML = '';
        for (let i = 0; i < questionsData.length; i++) {
            const q = questionsData[i];
            const selectedVal = userSelections[i];
            const block = document.createElement('div');
            block.className = 'question-block';
            block.setAttribute('data-qid', i);

            const questionTitle = document.createElement('div');
            questionTitle.className = 'question-text';
            questionTitle.innerText = `${i+1}. ${q.text}`;
            block.appendChild(questionTitle);

            const optionsList = document.createElement('ul');
            optionsList.className = 'options-list';

            // store feedback div reference
            const feedbackDiv = document.createElement('div');
            feedbackDiv.className = 'feedback';
            feedbackDiv.id = `fb-${i}`;

            for (let optIdx = 0; optIdx < q.options.length; optIdx++) {
                const li = document.createElement('li');
                li.className = 'option-item';
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = `q${i}`;
                radio.value = optIdx;
                radio.className = 'option-radio';
                if (selectedVal === optIdx) {
                    radio.checked = true;
                }
                // event listener for change
                radio.addEventListener('change', (function(qid, idx) {
                    return function(e) {
                        if (e.target.checked) {
                            userSelections[qid] = idx;
                            // update feedback line for this question (clear or show partial)
                            updateSingleFeedback(qid);
                            updateStatsAndResultBar();
                        }
                    };
                })(i, optIdx));

                const label = document.createElement('span');
                label.className = 'option-label';
                label.innerText = `${String.fromCharCode(65+optIdx)}. ${q.options[optIdx]}`;
                li.appendChild(radio);
                li.appendChild(label);
                optionsList.appendChild(li);
            }
            block.appendChild(optionsList);
            block.appendChild(feedbackDiv);
            container.appendChild(block);
            // set initial feedback (if already answered)
            updateSingleFeedback(i);
        }
        updateStatsAndResultBar();
    }

    // update feedback for a specific question based on current selection
    function updateSingleFeedback(qid) {
        const feedbackDiv = document.getElementById(`fb-${qid}`);
        if (!feedbackDiv) return;
        const selected = userSelections[qid];
        const question = questionsData[qid];
        if (selected === null || selected === undefined) {
            feedbackDiv.innerHTML = '';
            feedbackDiv.className = 'feedback';
            return;
        }
        const isCorrect = (selected === question.correct);
        const correctLetter = String.fromCharCode(65 + question.correct);
        const correctAnswerText = question.options[question.correct];
        if (isCorrect) {
            feedbackDiv.innerHTML = `✔ Correct.`;
            feedbackDiv.className = 'feedback correct';
        } else {
            feedbackDiv.innerHTML = `✘ Incorrect. Correct answer: ${correctLetter}. ${correctAnswerText}.`;
            feedbackDiv.className = 'feedback incorrect';
        }
    }

    // submit all: shows global score & also ensures each question feedback is correct/incorrect displayed
    function submitAll() {
        // first, optionally ensure any missing selections? No, we just compute final result.
        let allCorrect = 0;
        for (let i = 0; i < questionsData.length; i++) {
            if (userSelections[i] !== null && userSelections[i] === questionsData[i].correct) {
                allCorrect++;
            }
            // refresh feedback individually (useful if any radio changed but feedback inconsistent)
            updateSingleFeedback(i);
        }
        const total = questionsData.length;
        const percent = Math.round((allCorrect / total) * 100);
        const resultDiv = document.getElementById('resultArea');
        resultDiv.innerHTML = `<strong>📊 Final result: ${allCorrect} / ${total} correct (${percent}%)</strong><br>Review explanations below each question. Use "Reset all" to clear answers.`;
        updateStatsAndResultBar(); // sync score display
        // scroll gently
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // reset everything: clear selections, uncheck radios, clear feedback
    function resetAll() {
        userSelections = new Array(questionsData.length).fill(null);
        // re-render to clear all radio states and feedback
        renderQuestions();
        const resultDiv = document.getElementById('resultArea');
        resultDiv.innerHTML = `<span>🔄 All answers cleared. Start practicing again.</span>`;
        updateStatsAndResultBar();
    }

    // Additional: check if all answered and final submission can be repeated
    document.addEventListener('DOMContentLoaded', () => {
        renderQuestions();
        const submitBtn = document.getElementById('submitAllBtn');
        const resetBtn = document.getElementById('resetBtn');
        if (submitBtn) submitBtn.addEventListener('click', submitAll);
        if (resetBtn) resetBtn.addEventListener('click', resetAll);
    });
</script>
</body>
</html>
